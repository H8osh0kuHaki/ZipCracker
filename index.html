<!DOCTYPE html>
<html>
<head>
    <title>WiFi Tool</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scan Networks</h1>
        <form action="/scan" method="post"><button class="btn" style="background:#007bff">Start Scan</button></form>
        <ul>{% for n in networks %}<li>{{ n.ssid }} ({{ n.signal }} dBm)</li>{% endfor %}</ul>
    </div>

    <div class="card">
        <h1>Security Tester</h1>
        <form action="/test" method="post">
            <input type="text" name="ssid" placeholder="Target SSID" required><br><br>
            <textarea name="wordlist" placeholder="Passwords (comma separated)" rows="4" style="width:100%"></textarea><br><br>
            <button class="btn" style="background:#dc3545">Run PassTest</button>
        </form>
        {% if result %}<h3>{{ result }}</h3>{% endif %}
    </div>
</body>
</html>
